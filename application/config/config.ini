[hardware]
# Socket路径
gpio_socket = /tmp/gpio.sock
gpio_get_socket = /tmp/gpio_get.sock
ht1621_socket = /tmp/ht1621.sock
keyboard_socket = /tmp/keyboard_get.sock

# GPIO输出引脚定义 (seter模式)
lcd1_backlight = 1
lcd2_backlight = 2
lcd3_backlight = 3
lcd4_backlight = 4
box1_outer_door = 5
box1_inner_door = 6
box2_outer_door = 7
box2_inner_door = 8

# GPIO输入引脚定义 (geter模式)
box1_outer_door_sensor = 1
box1_inner_door_sensor = 2
box2_outer_door_sensor = 3
box2_inner_door_sensor = 4
box1_ir_sensor = 5
box2_ir_sensor = 6

# SPI设备映射
lcd1_spi = 1
lcd2_spi = 2
lcd3_spi = 3
lcd4_spi = 4

# 存件按钮GPIO (geter7, 0=松开, 1=按下)
store_button_gpio = 7

[timing]
# 关门信号稳定等待时间(秒)
door_close_delay = 3
# 学生取件超时时间(秒)
pickup_timeout = 60
# LCD背光显示时间(秒)
lcd_backlight_timeout = 10

[boxes]
# 柜子数量
box_count = 2
