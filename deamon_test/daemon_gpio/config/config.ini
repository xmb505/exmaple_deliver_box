[daemon_config]
# 控制命令Socket文件位置
socket_path = /tmp/gpio.sock
# GPIO状态监听Socket文件位置
get_statu_path = /tmp/gpio_get.sock

[GPIO1_sender]
# GPIO1配置：控制输出设备（如灯泡、门锁、继电器等）
tty_path = /dev/ttyUSB0
baudrate = 115200
alias = sender
# 模式：seter - 设置者，用于控制输出设备
mode = seter

[GPIO2_spi]
# GPIO2配置：SPI通信接口
tty_path = /dev/ttyUSB1
baudrate = 115200
alias = spi
# 模式：spi - 使用bitbanging方式实现低速SPI通信
mode = spi
# GPIO操作间隔时间（毫秒），考虑USB协议传输延迟
lag_time = 1

# 共享的时钟和数据线（所有SPI设备共用）
clk = 1
data = 2

# 14个独立的片选信号（GPIO 3-16）
cs_1 = 3
cs_2 = 4
cs_3 = 5
cs_4 = 6
cs_5 = 7
cs_6 = 8
cs_7 = 9
cs_8 = 10
cs_9 = 11
cs_10 = 12
cs_11 = 13
cs_12 = 14
cs_13 = 15
cs_14 = 16

[GPIO3_geter]
# GPIO3配置：读取输入设备（如传感器、按钮等）
tty_path = /dev/ttyUSB2
baudrate = 115200
alias = geter
# 模式：geter - 获取者，用于读取输入设备状态
mode = geter
# 默认电平：1-高电平采集，0-低电平采集
# 用于选择查询指令集：3D指令集（拉高GPIO后检测低电平）或3E指令集（拉低GPIO后检测高电平）
default_bit = 1